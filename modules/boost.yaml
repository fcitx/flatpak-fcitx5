name: boost
buildsystem: simple
sources:
  - type: archive
    url: https://archives.boost.io/release/1.91.0/source/boost_1_91_0.tar.bz2
    sha256: de5e6b0e4913395c6bdfa90537febd9028ea4c0735d2cdb0cd9b45d5f51264f5
    x-checker-data:
      type: anitya
      project-id: 6845
      stable-only: true
      url-template: https://archives.boost.io/release/$version/source/boost_${major}_${minor}_${patch}.tar.bz2
build-commands:
  - ./bootstrap.sh --prefix=${FLATPAK_DEST} --with-libraries=iostreams,regex,filesystem,system,locale
  - ./b2 headers
  - ./b2 -j$FLATPAK_BUILDER_N_JOBS install variant=release cxxstd=17 --layout=system
